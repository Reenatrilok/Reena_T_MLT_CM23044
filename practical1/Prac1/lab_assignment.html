<!DOCTYPE html>
<html>
<head>
<title>Linear Regression Assignment</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>

<body>

<h2>Linear Regression Prediction</h2>

<button onclick="train()">Train Model</button>

<h3 id="result"></h3>

<script>

async function train(){

const model=tf.sequential();

model.add(tf.layers.dense({units:1,inputShape:[1]}));

model.compile({
optimizer:'sgd',
loss:'meanSquaredError'
});

const xs=tf.tensor2d([1,2,3,4],[4,1]);
const ys=tf.tensor2d([2,4,6,8],[4,1]);

await model.fit(xs,ys,{epochs:200});

let prediction=model.predict(tf.tensor2d([5],[1,1]));

document.getElementById("result").innerText=
"Prediction for input 5: "+prediction.dataSync()[0];

}

</script>

</body>
</html>
