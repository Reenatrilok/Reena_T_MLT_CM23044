<!DOCTYPE html>
<html>
<head>
    <title>Pose Detection - PoseNet</title>

    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

    <!-- PoseNet -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #container {
            position: relative;
            display: inline-block;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        video {
            border: 2px solid black;
        }
    </style>
</head>

<body>

<h2>Real-Time Pose Detection (PoseNet)</h2>

<div id="container">
    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Setup Webcam
async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: true
    });

    video.srcObject = stream;

    return new Promise(resolve => {
        video.onloadedmetadata = () => {
            video.play();
            resolve(video);
        };
    });
}

// Draw Keypoints
function drawKeypoints(keypoints) {
    keypoints.forEach(point => {
        if (point.score > 0.5) {
            const { x, y } = point.position;

            ctx.beginPath();
            ctx.arc(x, y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "red";
            ctx.fill();
        }
    });
}

// Draw Skeleton
function drawSkeleton(keypoints) {
    const adjacentPairs = posenet.getAdjacentKeyPoints(keypoints, 0.5);

    adjacentPairs.forEach(pair => {
        ctx.beginPath();
        ctx.moveTo(pair[0].position.x, pair[0].position.y);
        ctx.lineTo(pair[1].position.x, pair[1].position.y);
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 2;
        ctx.stroke();
    });
}

// Main Detection Loop
async function detectPose(net) {
    const pose = await net.estimateSinglePose(video, {
        flipHorizontal: false
    });

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawKeypoints(pose.keypoints);
    drawSkeleton(pose.keypoints);

    requestAnimationFrame(() => detectPose(net));
}

// Main
async function main() {
    await setupCamera();
    console.log("Camera Ready");

    const net = await posenet.load();
    console.log("PoseNet Loaded");

    detectPose(net);
}

main();
</script>

</body>
</html>
