<!DOCTYPE html>
<html>
<head>
    <title>Pose Detection + Squat Counter</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #container {
            position: relative;
            display: inline-block;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #info {
            margin-top: 520px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Pose Detection + Squat Counter</h2>

<div id="container">
    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
</div>

<div id="info">
    Squats: <span id="count">0</span>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let squatCount = 0;
let stage = "up"; // up/down

// Setup Camera
async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    return new Promise(resolve => {
        video.onloadedmetadata = () => {
            video.play();
            resolve(video);
        };
    });
}

// Draw Keypoints
function drawKeypoints(keypoints) {
    keypoints.forEach(point => {
        if (point.score > 0.5) {
            const { x, y } = point.position;

            ctx.beginPath();
            ctx.arc(x, y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "red";
            ctx.fill();
        }
    });
}

// Draw Skeleton
function drawSkeleton(keypoints) {
    const adjacentPairs = posenet.getAdjacentKeyPoints(keypoints, 0.5);

    adjacentPairs.forEach(pair => {
        ctx.beginPath();
        ctx.moveTo(pair[0].position.x, pair[0].position.y);
        ctx.lineTo(pair[1].position.x, pair[1].position.y);
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 2;
        ctx.stroke();
    });
}

// Calculate Angle
function calculateAngle(a, b, c) {
    const ab = [a.x - b.x, a.y - b.y];
    const cb = [c.x - b.x, c.y - b.y];

    const dot = ab[0]*cb[0] + ab[1]*cb[1];
    const magAB = Math.sqrt(ab[0]**2 + ab[1]**2);
    const magCB = Math.sqrt(cb[0]**2 + cb[1]**2);

    const angle = Math.acos(dot / (magAB * magCB));
    return angle * (180 / Math.PI);
}

// Squat Detection Logic
function detectSquat(keypoints) {
    const hip = keypoints[11].position;
    const knee = keypoints[13].position;
    const ankle = keypoints[15].position;

    const angle = calculateAngle(hip, knee, ankle);

    // Debug (optional)
    // console.log(angle);

    if (angle < 90) {
        stage = "down";
    }

    if (angle > 160 && stage === "down") {
        stage = "up";
        squatCount++;
        document.getElementById("count").innerText = squatCount;
    }
}

// Detection Loop
async function detectPose(net) {
    const pose = await net.estimateSinglePose(video, {
        flipHorizontal: false
    });

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawKeypoints(pose.keypoints);
    drawSkeleton(pose.keypoints);

    detectSquat(pose.keypoints);

    requestAnimationFrame(() => detectPose(net));
}

// Main
async function main() {
    await setupCamera();
    console.log("Camera Ready");

    const net = await posenet.load();
    console.log("PoseNet Loaded");

    detectPose(net);
}

main();
</script>

</body>
</html>
