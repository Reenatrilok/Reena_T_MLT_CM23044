<!DOCTYPE html>
<html>
<head>
    <title>Model Deployment Assignment</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

    <style>
        body { text-align: center; font-family: Arial; }
        button { margin: 8px; padding: 10px; }
    </style>
</head>

<body>

<h2>Model Deployment Pipeline</h2>

<button onclick="trainModel()">Train</button>
<button onclick="saveModel()">Save (LocalStorage)</button>
<button onclick="loadModel()">Load</button>
<button onclick="predictOriginal()">Predict (Original)</button>
<button onclick="predictLoaded()">Predict (Loaded)</button>
<button onclick="exportModel()">Export Model</button>

<br><br>

<input type="file" id="upload" />
<button onclick="importModel()">Import Model</button>
<button onclick="predictImported()">Predict (Imported)</button>

<p id="output"></p>

<script>
let model;
let loadedModel;
let importedModel;

// Create Model
function createModel() {
    const m = tf.sequential();
    m.add(tf.layers.dense({ units: 1, inputShape: [1] }));

    m.compile({
        optimizer: tf.train.sgd(0.1),
        loss: 'meanSquaredError'
    });

    return m;
}

// Train
async function trainModel() {
    model = createModel();

    const xs = tf.tensor2d([1,2,3,4], [4,1]);
    const ys = tf.tensor2d([2,4,6,8], [4,1]);

    await model.fit(xs, ys, { epochs: 100 });

    document.getElementById("output").innerText = "Model trained";
}

// Save
async function saveModel() {
    await model.save('localstorage://my-model');
    document.getElementById("output").innerText = "Saved to LocalStorage";
}

// Load
async function loadModel() {
    loadedModel = await tf.loadLayersModel('localstorage://my-model');
    document.getElementById("output").innerText = "Loaded from LocalStorage";
}

// Predict Original
async function predictOriginal() {
    const result = await model.predict(tf.tensor2d([5],[1,1])).data();
    document.getElementById("output").innerText =
        "Original Prediction: " + result[0];
}

// Predict Loaded
async function predictLoaded() {
    const result = await loadedModel.predict(tf.tensor2d([5],[1,1])).data();
    document.getElementById("output").innerText =
        "Loaded Prediction: " + result[0];
}

// Export Model (Download files)
async function exportModel() {
    await model.save('downloads://my-model');
    document.getElementById("output").innerText =
        "Model exported (check downloads)";
}

// Import Model
async function importModel() {
    const files = document.getElementById("upload").files;

    if (files.length < 2) {
        alert("Upload model.json and weights.bin");
        return;
    }

    importedModel = await tf.loadLayersModel(
        tf.io.browserFiles([files[0], files[1]])
    );

    document.getElementById("output").innerText =
        "Model imported successfully";
}

// Predict Imported
async function predictImported() {
    const result = await importedModel.predict(tf.tensor2d([5],[1,1])).data();
    document.getElementById("output").innerText =
        "Imported Prediction: " + result[0];
}
</script>

</body>
</html>
